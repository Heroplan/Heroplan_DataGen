name: Update lottery_config

on:
  schedule:
    # 每天 UTC 7:01 = 北京时间 15:01
    - cron: '1 7 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies (if any)
        run: |
          echo "No extra dependencies needed"

      - name: Run lottery script
        run: python "6.更新奖池.py"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add lottery_config.json
          git diff --staged --quiet || git commit -m "Auto update lottery_config.json"
          git push