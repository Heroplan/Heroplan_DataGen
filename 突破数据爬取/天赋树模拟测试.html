<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全职业 - 天赋树模拟器 (带资源计算)</title>
    <style>
        :root {
            --node-size: 60px;
            --selected-border: #f0e68c;
            --mandatory-selected-border: #ffd700;
            --line-color: #555;
            --line-color-active: #f0e68c;
        }

        body {
            background-color: #1a1a1a;
            color: #f0f0f0;
            font-family: 'Microsoft YaHei', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        #header {
            text-align: center;
            margin-bottom: 10px;
            width: 100%;
        }

        #header h1 {
            color: var(--selected-border);
            margin: 0 0 10px 0;
        }

        #controls-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .control-group label {
            font-size: 1.1em;
        }

        #class-selector,
        #auto-path-strategy {
            background-color: #333;
            color: #f0f0f0;
            border: 1px solid #555;
            padding: 8px;
            border-radius: 5px;
            font-size: 1em;
        }

        #star-selector input[type="radio"],
        #auto-path-controls input[type="checkbox"] {
            display: none;
        }

        #star-selector label,
        #auto-path-controls label[for="mana-priority"] {
            background-color: #333;
            border: 1px solid #555;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            font-size: 1em;
        }

        #star-selector input[type="radio"]:checked+label,
        #auto-path-controls input[type="checkbox"]:checked+label {
            background-color: #4a4a28;
            border-color: var(--selected-border);
            color: var(--selected-border);
            box-shadow: 0 0 10px rgba(240, 230, 140, 0.5);
        }

        #apply-auto-path {
            background-color: #284469;
            color: white;
            border: 1px solid #5a9ee9;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: background-color 0.3s;
        }

        #apply-auto-path:hover {
            background-color: #3a629b;
        }


        #stats-display,
        #cost-display {
            background-color: rgba(0, 0, 0, 0.3);
            border: 1px solid #555;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px 20px;
            width: 90%;
            max-width: 700px;
        }

        .stat-item {
            background-color: #333;
            padding: 8px 15px;
            border-radius: 5px;
            font-size: 1em;
            text-align: center;
            min-width: 120px;
        }

        .stat-item span,
        .cost-item span {
            color: var(--selected-border);
            font-weight: bold;
            margin-left: 8px;
        }

        #info-panel {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #555;
            text-align: center;
        }

        #info-panel h2 {
            margin: 0 0 10px 0;
            font-size: 1.2em;
        }

        #reset-all {
            background-color: #8c3a3a;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
            transition: background-color 0.3s;
        }

        #reset-all:hover {
            background-color: #a84646;
        }

        .talent-tree {
            position: relative;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .level {
            display: flex;
            justify-content: center;
            margin: 5px 0;
            min-height: var(--node-size);
            align-items: center;
            width: 150px;
        }

        .node-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
        }

        .node {
            width: var(--node-size);
            height: var(--node-size);
            position: relative;
            z-index: 2;
            user-select: none;
            cursor: pointer;
            transition: filter 0.3s, box-shadow 0.3s;
            filter: grayscale(100%);
        }

        #node-26_1 {
            cursor: default;
        }

        .node.selected {
            filter: grayscale(0%);
        }

        .node.selected.mandatory {}

        .node img {
            position: absolute;
            object-fit: contain;
            pointer-events: none;
        }

        .node .node-img-base,
        .node .node-img-overlay,
        .node .node-img-final-border {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            object-fit: contain;
        }

        .node .node-img-base {
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .node .node-img-overlay {
            width: 45%;
            height: 45%;
            z-index: 2;
        }

        .node .node-img-plus {
            width: 20%;
            height: 20%;
            top: 40%;
            right: 20%;
            z-index: 3;
        }

        .node .node-img-final-border {
            width: 80%;
            height: 80%;
            z-index: 4;
        }

        /* --- 新增：数值文本样式 --- */
        .node .node-value {
            position: absolute;
            bottom: 8%;
            left: 50%;
            transform: translateX(-50%);
            color: rgb(255, 0, 221);
            font-size: 14px;
            font-weight: bold;
            text-shadow: 1px 1px 2px black, -1px -1px 2px black, 1px -1px 2px black, -1px 1px 2px black;
            z-index: 5;
            pointer-events: none;
        }

        .connector {
            position: absolute;
            background-color: var(--line-color);
            z-index: 1;
            transition: background-color 0.3s ease;
        }

        .connector.active {
            background-color: var(--line-color-active);
        }
    </style>
</head>

<body>
    <div id="header">
        <h1>全职业天赋模拟器</h1>
        <div id="controls-container">
            <div class="control-group">
                <label for="class-selector">选择职业:</label>
                <select id="class-selector"></select>
            </div>
            <div class="control-group">
                <label>英雄星级:</label>
                <div id="star-selector">
                    <input type="radio" id="star-3" name="star-level" value="3">
                    <label for="star-3">3星</label>
                    <input type="radio" id="star-4" name="star-level" value="4">
                    <label for="star-4">4星</label>
                    <input type="radio" id="star-5" name="star-level" value="5" checked>
                    <label for="star-5">5星</label>
                </div>
            </div>
            <div class="control-group" id="auto-path-controls">
                <label for="auto-path-strategy">自动寻路:</label>
                <select id="auto-path-strategy">
                    <option value="atk-def-hp">攻 > 防 > 血</option>
                    <option value="atk-hp-def">攻 > 血 > 防</option>
                    <option value="def-hp-atk">防 > 血 > 攻</option>
                    <option value="hp-def-atk">血 > 防 > 攻</option>
                </select>
                <input type="checkbox" id="mana-priority">
                <label for="mana-priority">法力必选</label>
                <button id="apply-auto-path">应用</button>
            </div>
        </div>
    </div>

    <div id="stats-display">
        <div class="stat-item">攻击: <span id="stat-attack">1000</span></div>
        <div class="stat-item">防御: <span id="stat-defense">1000</span></div>
        <div class="stat-item">生命: <span id="stat-health">1000</span></div>
        <div class="stat-item">法力: <span id="stat-mana">+0%</span></div>
        <div class="stat-item">治疗: <span id="stat-healing">+0%</span></div>
        <div class="stat-item">暴击: <span id="stat-crit">+0%</span></div>
    </div>

    <div id="cost-display">
        <div class="cost-item">纹章: <span id="cost-emblem">0</span></div>
        <div class="cost-item">食物: <span id="cost-food">0</span></div>
        <div class="cost-item">铁矿: <span id="cost-iron">0</span></div>
        <div class="cost-item">大师纹章: <span id="cost-master-emblem">0</span></div>
    </div>

    <div id="reverse-calculator"
        style="background-color: rgba(0, 0, 0, 0.3); border: 1px solid #555; border-radius: 8px; padding: 15px; margin-bottom: 20px; width: 90%; max-width: 700px; text-align: center;">
        <h2 style="color: var(--selected-border); margin-top: 0;">基础属性反推器 (全左路)</h2>
        <p style="font-size: 0.9em; color: #aaa;">输入英雄满25天赋后的属性，将根据“全左路”天赋方案反推基础属性。</p>
        <div id="reverse-inputs"
            style="display: flex; justify-content: center; gap: 20px; margin: 20px 0; flex-wrap: wrap;">
            <div class="control-group">
                <label for="final-attack">最终攻击:</label>
                <input type="number" id="final-attack"
                    style="width: 80px; background-color: #333; color: #f0f0f0; border: 1px solid #555; padding: 8px; border-radius: 5px;">
            </div>
            <div class="control-group">
                <label for="final-defense">最终防御:</label>
                <input type="number" id="final-defense"
                    style="width: 80px; background-color: #333; color: #f0f0f0; border: 1px solid #555; padding: 8px; border-radius: 5px;">
            </div>
            <div class="control-group">
                <label for="final-health">最终生命:</label>
                <input type="number" id="final-health"
                    style="width: 80px; background-color: #333; color: #f0f0f0; border: 1px solid #555; padding: 8px; border-radius: 5px;">
            </div>
        </div>
        <button id="calculate-base-stats"
            style="background-color: #286944; color: white; border: 1px solid #5ae998; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 1.1em;">计算基础属性</button>
        <div id="reverse-results"
            style="margin-top: 20px; font-size: 1.2em; display: flex; flex-direction: column; gap: 10px; align-items: center;">
            <div id="result-base-attack">计算出的基础攻击: <span
                    style="color: var(--selected-border); font-weight: bold;">---</span></div>
            <div id="result-base-defense">计算出的基础防御: <span
                    style="color: var(--selected-border); font-weight: bold;">---</span></div>
            <div id="result-base-health">计算出的基础生命: <span
                    style="color: var(--selected-border); font-weight: bold;">---</span></div>
        </div>
    </div>

    <div id="info-panel">
        <h2 id="class-title">职业天赋</h2>
        <p><span id="points-spent">0</span> / 25</p>
        <button id="reset-all">重置当前职业</button>
    </div>

    <div class="talent-tree" id="talent-tree-container">
    </div>

                const q = [...forkNode.unlocks];
                const visited = new Set(q);
                while (q.length > 0) {
                    const currentId = q.shift();
                    if (currentId === mergeNode.id) continue;
                    nodesToClear.add(currentId);
                    talentData[currentId].unlocks.forEach(childId => {
                        if (!visited.has(childId)) { visited.add(childId); q.push(childId); }
                    });
                }
                nodesToClear.forEach(id => selectedNodes.delete(id));
                if (mergeNode && selectedNodes.has(mergeNode.id)) {
                    const newSegment = findGuidedSegment(forkNode, mergeNode, clickedNodeId);
                    newSegment.forEach(id => selectedNodes.add(id));
                } else {
                    const pathToClickedNode = getSmartPath(clickedNodeId);
                    pathToClickedNode.forEach(id => selectedNodes.add(id));
                }
            } else {
                const fullPath = getSmartPath(clickedNodeId);
                fullPath.forEach(id => selectedNodes.add(id));
            }
            if (selectedNodes.has('25_1')) {
                selectedNodes.add('26_1');
            }
            updateUI();
        }

        function getNodeScore(nodeId, weights) {
            const nodeText = talentData[nodeId]?.text || '';
            const match = nodeText.match(/^(攻击|防御|生命|法力|治疗|暴击)/);
            if (match) {
                const statName = match[1];
                return weights[statName] || 0;
            }
            return 0;
        }

        function applyAutoPath() {
            const strategy = document.getElementById('auto-path-strategy').value;
            const manaPriority = document.getElementById('mana-priority').checked;
            const weights = { '攻击': 0, '防御': 0, '生命': 0, '法力': 0, '治疗': 0, '暴击': 0 };

            const parts = strategy.split('-');
            const statMap = { atk: '攻击', def: '防御', hp: '生命' };

            weights[statMap[parts[0]]] = 4;
            weights[statMap[parts[1]]] = 2;
            weights[statMap[parts[2]]] = 1;

            if (manaPriority) {
                weights['法力'] = 8;
            }

            const scorePath = (path) => path.reduce((acc, id) => acc + getNodeScore(id, weights), 0);

            selectedNodes.clear();

            const mandatoryNodes = ['1_1', '4_1', '7_1', '10_1', '12_1', '15_1', '18_1', '20_1', '23_1', '25_1', '26_1'];
            const segments = [
                { path1: ['2_1', '3_1'], path2: ['2_2', '3_2'] },
                { path1: ['5_1', '6_1'], path2: ['5_2', '6_2'] },
                { path1: ['8_1', '9_1'], path2: ['8_2', '9_2'] },
                { path1: ['11_1'], path2: ['11_2'] },
                { path1: ['13_1', '14_1'], path2: ['13_2', '14_2'] },
                { path1: ['16_1', '17_1'], path2: ['16_2', '17_2'] },
                { path1: ['19_1'], path2: ['19_2'] },
                { path1: ['21_1', '22_1'], path2: ['21_2', '22_2'] },
                { path1: ['24_1'], path2: ['24_2'] },
            ];

            mandatoryNodes.forEach(id => selectedNodes.add(id));

            segments.forEach(seg => {
                const score1 = scorePath(seg.path1);
                const score2 = scorePath(seg.path2);
                const winningPath = (score1 >= score2) ? seg.path1 : seg.path2;
                winningPath.forEach(id => selectedNodes.add(id));
            });
            updateUI();
        }

        function updateUI() {
            if (selectedNodes.has('25_1')) {
                selectedNodes.add('26_1');
            }
            Object.keys(talentData).forEach(nodeId => {
                const nodeElement = document.getElementById(`node-${nodeId}`);
                if (!nodeElement) return;
                const isSelected = selectedNodes.has(nodeId);
                nodeElement.classList.remove('available', 'selected', 'mandatory');
                if (isSelected) {
                    nodeElement.classList.add('selected');
                    if (talentData[nodeId].type === 'mandatory') nodeElement.classList.add('mandatory');
                } else {
                    const nodeInfo = talentData[nodeId];
                    if (!nodeInfo.prereq || nodeInfo.prereq.some(p => selectedNodes.has(p))) {
                        nodeElement.classList.add('available');
                    }
                }
            });
            document.querySelectorAll('.connector').forEach(conn => conn.classList.remove('active'));
            selectedNodes.forEach(nodeId => {
                const nodeInfo = talentData[nodeId];
                if (nodeInfo.unlocks) {
                    nodeInfo.unlocks.forEach(unlockedId => {
                        const unlockedNodeInfo = talentData[unlockedId];
                        if (selectedNodes.has(unlockedId) && unlockedNodeInfo.prereq.includes(nodeId)) {
                            const conn = document.querySelector(`.connector[data-connects="${nodeId}-${unlockedId}"]`);
                            if (conn) conn.classList.add('active');
                        }
                    });
                }
            });
            let spendablePoints = selectedNodes.size;
            if (selectedNodes.has('26_1')) spendablePoints--;
            document.getElementById('points-spent').textContent = spendablePoints;
            calculateAndDisplayStats();
            calculateAndDisplayCosts();
        }

            const basePositions = { '1_1': { level: 1, index: 0 }, '2_1': { level: 2, index: 0 }, '2_2': { level: 2, index: 1 }, '3_1': { level: 3, index: 0 }, '3_2': { level: 3, index: 1 }, '4_1': { level: 4, index: 0 }, '5_1': { level: 5, index: 0 }, '5_2': { level: 5, index: 1 }, '6_1': { level: 6, index: 0 }, '6_2': { level: 6, index: 1 }, '7_1': { level: 7, index: 0 }, '8_1': { level: 8, index: 0 }, '8_2': { level: 8, index: 1 }, '9_1': { level: 9, index: 0 }, '9_2': { level: 9, index: 1 }, '10_1': { level: 10, index: 0 }, '11_1': { level: 11, index: 0 }, '11_2': { level: 11, index: 1 }, '12_1': { level: 12, index: 0 }, '13_1': { level: 13, index: 0 }, '13_2': { level: 13, index: 1 }, '14_1': { level: 14, index: 0 }, '14_2': { level: 14, index: 1 }, '15_1': { level: 15, index: 0 }, '16_1': { level: 16, index: 0 }, '16_2': { level: 16, index: 1 }, '17_1': { level: 17, index: 0 }, '17_2': { level: 17, index: 1 }, '18_1': { level: 18, index: 0 }, '19_1': { level: 19, index: 0 }, '19_2': { level: 19, index: 1 }, '20_1': { level: 20, index: 0 }, '21_1': { level: 21, index: 0 }, '21_2': { level: 21, index: 1 }, '22_1': { level: 22, index: 0 }, '22_2': { level: 22, index: 1 }, '23_1': { level: 23, index: 0 }, '24_1': { level: 24, index: 0 }, '24_2': { level: 24, index: 1 }, '25_1': { level: 25, index: 0 }, '26_1': { level: 26, index: 0 } };
            Object.keys(talentData).forEach(nodeId => {
                talentData[nodeId].id = nodeId;
                talentData[nodeId].unlocks = baseUnlocks[nodeId];
                talentData[nodeId].prereq = basePrereqs[nodeId];
                talentData[nodeId].position = basePositions[nodeId];
            });
            selectedNodes.clear();
            document.getElementById('class-title').textContent = classData[classKey].name + '天赋';
            document.getElementById('talent-tree-container').innerHTML = '';
            createTree();
            updateUI();
        }

        function createTree() {
            const levels = {};
            let maxLevel = 0;
            Object.values(talentData).forEach(node => {
                const level = node.position.level;
                if (!levels[level]) levels[level] = [];
                levels[level].push(node);
                if (level > maxLevel) maxLevel = level;
            });
            for (let i = 1; i <= maxLevel; i++) {
                const levelNodes = levels[i] || [];
                const levelDiv = document.createElement('div');
                levelDiv.className = 'level';
                const leftNode = levelNodes.find(n => n.position.index === 0);
                const rightNode = levelNodes.find(n => n.position.index === 1);
                const leftWrapper = document.createElement('div');
                leftWrapper.className = 'node-wrapper';
                if (leftNode) leftWrapper.appendChild(createNodeDiv(leftNode.id));
                const rightWrapper = document.createElement('div');
                rightWrapper.className = 'node-wrapper';
                if (rightNode) rightWrapper.appendChild(createNodeDiv(rightNode.id));
                if (levelNodes.length === 1 && levelNodes[0].position.index === 0) {
                    levelDiv.style.justifyContent = 'center';
                    levelDiv.appendChild(leftWrapper);
                } else {
                    levelDiv.appendChild(leftWrapper);
                    levelDiv.appendChild(rightWrapper);
                }
                container.appendChild(levelDiv);
            }
            Object.keys(talentData).forEach(nodeId => {
                const nodeInfo = talentData[nodeId];
                if (nodeInfo.unlocks) {
                    nodeInfo.unlocks.forEach(targetId => {
                        const targetNodeInfo = talentData[targetId];
                        if (targetNodeInfo && targetNodeInfo.prereq && targetNodeInfo.prereq.includes(nodeId)) {
                            const conn = document.createElement('div');
                            conn.className = 'connector';
                            conn.dataset.connects = `${nodeId}-${targetId}`;
                            container.appendChild(conn);
                        }
                    });
                }
            });
            positionConnectors();
        }

        function getNodeImageLayers(nodeId, nodeInfo) {
            const images = [];
            const level = parseInt(nodeId.split('_')[0]);
            const text = nodeInfo.text;

            if ((level >= 21 && level <= 25) || level === 26) {
                images.push({ src: 'imgs/talents/master.png', class: 'node-img-base' });
            } else {
                images.push({ src: 'imgs/talents/talent.png', class: 'node-img-base' });
            }

            const classKeywordMap = { '游侠': 'ranger.png', '战士': 'fighter.png', '圣骑': 'paladin.png', '野蛮人': 'barbarian.png', '牧师': 'cleric.png', '德鲁伊': 'druid.png', '僧侣': 'monk.png', '盗贼': 'rogue.png', '术士': 'sorcerer.png', '巫师': 'wizard.png' };
            const statKeywordMap = { '攻击': 'attack.png', '防御': 'defense.png', '生命': 'health.png', '法力': 'mana.png', '治疗': 'healing.png', '暴击': 'critical.png' };

            let iconSrc = null;
            if (text.includes('天赋')) {
                for (const keyword in classKeywordMap) {
                    if (text.includes(keyword)) {
                        iconSrc = `imgs/classes/${classKeywordMap[keyword]}`;
                        break;
                    }
                }
            }
            if (!iconSrc) {
                for (const keyword in statKeywordMap) {
                    if (text.includes(keyword)) {
                        iconSrc = `imgs/talents/${statKeywordMap[keyword]}`;
                        break;
                    }
                }
            }
            if (iconSrc) {
                images.push({ src: iconSrc, class: 'node-img-overlay' });
            }

            if (text.includes('%') && !text.includes('法力') && !text.includes('暴击') && !text.includes('治疗')) {
                images.push({ src: 'imgs/talents/plus.png', class: 'node-img-plus' });
            }

            if (nodeId === '20_1' || nodeId === '26_1') {
                images.push({ src: 'imgs/talents/final.png', class: 'node-img-final-border' });
            }

            return images;
        }

        function getNodeDisplayValue(nodeInfo) {
            const text = nodeInfo.text;
            if (text.includes('天赋')) {
                return '';
            }

            const match = text.match(/\+\s*(\d+)(%?)/);
            if (!match) {
                return '';
            }

            const value = parseInt(match[1]);
            const isPercent = match[2] === '%';

            if (isPercent) {
                const baseStats = { '攻击': 1000, '防御': 1000, '生命': 1000 };
                const statName = text.split(' ')[0];

                if (baseStats[statName]) {
                    const calculatedValue = Math.floor(baseStats[statName] * (value / 100));
                    return `+${calculatedValue}`;
                } else {
                    return `+${value}%`;
                }
            } else {
                return `+${value}`;
            }
        }

        function createNodeDiv(nodeId) {
            const nodeInfo = talentData[nodeId];
            const nodeDiv = document.createElement('div');
            nodeDiv.id = `node-${nodeId}`;
            nodeDiv.className = `node ${nodeInfo.type}`;
            nodeDiv.title = nodeInfo.text;

            const imageLayers = getNodeImageLayers(nodeId, nodeInfo);
            imageLayers.forEach(layer => {
                const img = document.createElement('img');
                img.className = layer.class;
                img.src = layer.src;
                img.alt = '';
                nodeDiv.appendChild(img);
            });

            const valueText = getNodeDisplayValue(nodeInfo);
            if (valueText) {
                const valueSpan = document.createElement('span');
                valueSpan.className = 'node-value';
                valueSpan.textContent = valueText;
                nodeDiv.appendChild(valueSpan);
            }

            nodeDiv.onclick = () => handleNodeClick(nodeId);
            return nodeDiv;
        }

        function positionConnectors() {
            setTimeout(() => {
                document.querySelectorAll('.connector').forEach(conn => {
                    const [startId, endId] = conn.dataset.connects.split('-');
                    const startNode = document.getElementById(`node-${startId}`);
                    const endNode = document.getElementById(`node-${endId}`);
                    if (!startNode || !endNode) { conn.style.display = 'none'; return; };
                    const startRect = startNode.getBoundingClientRect();
                    const endRect = endNode.getBoundingClientRect();
                    const containerRect = container.getBoundingClientRect();
                    const startX = startRect.left + startRect.width / 2 - containerRect.left;
                    const startY = startRect.top + startRect.height / 2 - containerRect.top;
                    const endX = endRect.left + endRect.width / 2 - containerRect.left;
                    const endY = endRect.top + endRect.height / 2 - containerRect.top;
                    const angle = Math.atan2(endY - startY, endX - startX) * 180 / Math.PI;
                    const length = Math.sqrt(Math.pow(endX - startX, 2) + Math.pow(endY - startY, 2));
                    conn.style.width = `${length}px`;
                    conn.style.height = '4px';
                    conn.style.top = `${startY - 2}px`;
                    conn.style.left = `${startX}px`;
                    conn.style.transformOrigin = 'left center';
                    conn.style.transform = `rotate(${angle}deg)`;
                });
            }, 50);
        }

        // --- NEW REVERSE CALCULATOR FUNCTIONS ---

        function calculateAllLeftBonuses(classKey) {
            const bonuses = {
                attack_flat: 0, defense_flat: 0, health_flat: 0,
                attack_percent: 0, defense_percent: 0, health_percent: 0
            };

            const leftPathIds = [
                '1_1', '2_1', '3_1', '4_1', '5_1', '6_1', '7_1', '8_1', '9_1', '10_1',
                '11_1', '12_1', '13_1', '14_1', '15_1', '16_1', '17_1', '18_1', '19_1', '20_1',
                '21_1', '22_1', '23_1', '24_1', '25_1'
            ];

            const currentClassData = classData[classKey].data;

            leftPathIds.forEach(nodeId => {
                const nodeInfo = currentClassData[nodeId];
                if (!nodeInfo || !nodeInfo.text) return;

                const nodeText = nodeInfo.text;
                const parts = nodeText.split(' ');
                if (parts.length < 2) return;

                const statName = parts[0];
                const valueStr = parts[1];
                const value = parseInt(valueStr.replace(/[+%]/g, ''));

                if (isNaN(value)) return;

                if (nodeText.includes('%')) {
                    if (statName === '攻击') bonuses.attack_percent += value;
                    else if (statName === '防御') bonuses.defense_percent += value;
                    else if (statName === '生命') bonuses.health_percent += value;
                } else {
                    if (statName === '攻击') bonuses.attack_flat += value;
                    else if (statName === '防御') bonuses.defense_flat += value;
                    else if (statName === '生命') bonuses.health_flat += value;
                }
            });

            return bonuses;
        }

        function reverseCalculateBaseStat(finalStat, flatBonus, percentBonusDecimal) {
            if (isNaN(finalStat) || finalStat <= 0) {
                return "---";
            }
            // Estimate the base stat
            const guess = Math.round((finalStat - flatBonus) / (1 + percentBonusDecimal));

            // Search in a small range around the guess for a solution
            for (let i = -5; i <= 5; i++) {
                const testBase = guess + i;
                if (testBase <= 0) continue;

                const calculatedFinal = testBase + flatBonus + Math.floor(testBase * percentBonusDecimal);

                if (calculatedFinal === finalStat) {
                    return testBase;
                }
            }

            return "未找到"; // Return if no exact match is found
        }

        function setupReverseCalculator() {
            document.getElementById('calculate-base-stats').addEventListener('click', () => {
                const finalAttack = parseInt(document.getElementById('final-attack').value);
                const finalDefense = parseInt(document.getElementById('final-defense').value);
                const finalHealth = parseInt(document.getElementById('final-health').value);

                const bonuses = calculateAllLeftBonuses(currentClassKey);

                const baseAttack = reverseCalculateBaseStat(finalAttack, bonuses.attack_flat, bonuses.attack_percent / 100);
                const baseDefense = reverseCalculateBaseStat(finalDefense, bonuses.defense_flat, bonuses.defense_percent / 100);
                const baseHealth = reverseCalculateBaseStat(finalHealth, bonuses.health_flat, bonuses.health_percent / 100);

                document.querySelector('#result-base-attack span').textContent = baseAttack;
                document.querySelector('#result-base-defense span').textContent = baseDefense;
                document.querySelector('#result-base-health span').textContent = baseHealth;
            });
        }


        function initialize() {
            const classSelector = document.getElementById('class-selector');
            for (const classKey in classData) {
                const option = document.createElement('option');
                option.value = classKey;
                option.textContent = classData[classKey].name;
                classSelector.appendChild(option);
            }
            classSelector.onchange = (e) => setupClass(e.target.value);

            document.querySelectorAll('#star-selector input').forEach(radio => {
                radio.onchange = (e) => {
                    currentStarLevel = parseInt(e.target.value);
                    updateUI();
                }
            });

            document.getElementById('reset-all').onclick = () => {
                selectedNodes.clear();
                updateUI();
            };

            document.getElementById('apply-auto-path').onclick = applyAutoPath;

            setupClass(currentClassKey);
            setupReverseCalculator(); // Initialize the new feature
            window.onresize = positionConnectors;
        }

        initialize();
    </script>
